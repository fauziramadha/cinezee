<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Offline — CineStream</title>
  <meta name="theme-color" content="#B20710" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .container {
      max-width: 360px;
      width: 100%;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: #B20710;
      border-radius: 16px;
      margin-bottom: 24px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      box-shadow: 0 8px 24px rgba(178, 7, 16, 0.3);
    }

    .logo span {
      color: #fff;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 15px;
      color: #a3a3a3;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .icon-offline {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      opacity: 0.6;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #B20710;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      -webkit-appearance: none;
    }

    .retry-btn:active {
      transform: scale(0.97);
      background: #d10a1a;
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #525252;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span>CS</span>
    </div>

    <svg class="icon-offline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>

    <h1>Anda Sedang Offline</h1>
    <p>
      Tidak ada koneksi internet. CineStream tetap menampilkan konten yang sudah
      Anda buka sebelumnya. Sambungkan internet untuk streaming film & TV show
      baru.
    </p>

    <button class="retry-btn" onclick="location.reload()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Coba Lagi
    </button>

    <div class="footer">
      CineStream &middot; PWA Edition
    </div>
  </div>

  <script>
    // Auto-reload saat internet kembali
    window.addEventListener('online', function() {
      location.reload();
    });

    // Cek koneksi saat load
    if (navigator.onLine) {
      location.reload();
    }
  </script>
</body>
</html>

# CineStream — Cloudflare Workers Config
# Updated: Remove [vars] section to prevent dashboard variables override
#
# ALL environment variables (secrets + non-secrets) are set in:
# Cloudflare Dashboard → Workers & Pages → cinezee → Settings → Variables and Secrets
#
# This prevents the "variables disappear on redeploy" issue.

name = "cinestream"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets (frontend build output)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# =====================================================
# D1 Database Binding (Cloudflare D1)
# =====================================================
# This connects the Worker to your D1 database.
# Access in code via: getRequestContext().env.DB
[[d1_databases]]
binding = "DB"
database_name = "cinezee-db"
database_id = "b10ed6c8-9d1e-46f9-aea3-23eaf47094f0"

# =====================================================
# Environment Variables
# =====================================================
# DO NOT put variables here! Set ALL variables in Dashboard instead:
# Workers & Pages → cinezee → Settings → Variables and Secrets
#
# Required variables to set in Dashboard:
#   TMDB_API_KEY          — TMDB v3 API key (Plain text)
#   NEXTAUTH_URL          — https://cinezee.fauziramadhani4321.workers.dev (Plain text)
#   NEXTAUTH_SECRET       — Random 32+ char string (Plain text)
#   GOOGLE_CLIENT_ID      — Google OAuth Client ID (Plain text)
#   GOOGLE_CLIENT_SECRET  — Google OAuth Client Secret (Plain text)
#   DATABASE_URL          — file:./prisma/dev.db (Plain text, dummy for Prisma CLI)
#   NEXT_PUBLIC_APP_NAME  — CineStream (Plain text, optional)

# =====================================================
# Build Settings
# =====================================================
[build]
command = "npx @opennextjs/cloudflare build"

# Observability
[observability]
enabled = true

# CineStream — Cloudflare Workers Config
# ALL variables are set as Secrets in Dashboard (never touched by wrangler.toml).

name = "cinezee"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# =====================================================
# D1 Database Binding
# =====================================================
[[d1_databases]]
binding = "DB"
database_name = "cinezee-db"
database_id = "b10ed6c8-9d1e-46f9-aea3-23eaf47094f0"

# =====================================================
# Environment Variables
# =====================================================
# DO NOT put variables here! ALL variables are set as Secrets in Dashboard:
# Workers & Pages → cinezee → Settings → Variables and Secrets → Add → Secret (Encrypt)
#
# Variables set as Secrets:
# - TMDB_API_KEY
# - NEXTAUTH_URL
# - NEXTAUTH_SECRET
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - DATABASE_URL
# - NEXT_PUBLIC_APP_NAME

# =====================================================
# Build Settings
# =====================================================
# IMPORTANT: "npx prisma generate" must run BEFORE @opennextjs/cloudflare build
# to generate the Prisma Client (TypeScript code) that the app needs at runtime.
[build]
command = "npx @opennextjs/cloudflare build"

# Observability
[observability]
enabled = true
